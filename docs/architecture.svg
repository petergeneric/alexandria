<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#666" />
    </marker>
    <style>
      .box { rx: 6; ry: 6; stroke-width: 1.5; }
      .label { font-weight: 600; font-size: 13px; }
      .sublabel { font-size: 11px; fill: #555; }
      .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="640" height="180" fill="#fafafa" rx="8" />

  <!-- Top row: data pipeline -->

  <!-- Browser Extension -->
  <rect x="20" y="20" width="120" height="56" class="box" fill="#fff3e0" stroke="#e65100" />
  <text x="80" y="44" text-anchor="middle" class="label" fill="#e65100">Browser</text>
  <text x="80" y="60" text-anchor="middle" class="sublabel">Extension</text>

  <!-- SQLite -->
  <rect x="190" y="20" width="120" height="56" class="box" fill="#f3e5f5" stroke="#7b1fa2" />
  <text x="250" y="44" text-anchor="middle" class="label" fill="#7b1fa2">SQLite</text>
  <text x="250" y="60" text-anchor="middle" class="sublabel">pages.db</text>

  <!-- Core -->
  <rect x="360" y="20" width="120" height="56" class="box" fill="#e8f5e9" stroke="#2e7d32" />
  <text x="420" y="44" text-anchor="middle" class="label" fill="#2e7d32">Core</text>
  <text x="420" y="60" text-anchor="middle" class="sublabel">Rust library</text>

  <!-- Tantivy -->
  <rect x="530" y="20" width="90" height="56" class="box" fill="#fff8e1" stroke="#f57f17" />
  <text x="575" y="44" text-anchor="middle" class="label" fill="#f57f17">Tantivy</text>
  <text x="575" y="60" text-anchor="middle" class="sublabel">Index</text>

  <!-- Bottom row: frontends -->

  <!-- macOS App -->
  <rect x="330" y="110" width="110" height="50" class="box" fill="#e0f2f1" stroke="#00695c" />
  <text x="385" y="132" text-anchor="middle" class="label" fill="#00695c">macOS App</text>
  <text x="385" y="148" text-anchor="middle" class="sublabel">SwiftUI + UniFFI</text>

  <!-- CLI -->
  <rect x="460" y="110" width="80" height="50" class="box" fill="#eceff1" stroke="#455a64" />
  <text x="500" y="137" text-anchor="middle" class="label" fill="#455a64">CLI</text>

  <!-- Top row arrows -->
  <line x1="140" y1="48" x2="187" y2="48" class="arrow" />
  <line x1="310" y1="48" x2="357" y2="48" class="arrow" />
  <line x1="480" y1="48" x2="527" y2="48" class="arrow" />

  <!-- Frontends → Core -->
  <line x1="400" y1="110" x2="420" y2="79" class="arrow" />
  <line x1="490" y1="110" x2="440" y2="79" class="arrow" />
</svg>