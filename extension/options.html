<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alexandria Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 500px;
      margin: 20px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { font-size: 18px; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }
    .checkbox-row label { margin: 0; font-weight: normal; }
    textarea {
      width: 100%;
      height: 120px;
      font-family: monospace;
      font-size: 13px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }
    .status {
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
    }
    .status.ok { background: #e6f4ea; color: #1a7f37; }
    .status.error { background: #fdecea; color: #c0392b; }
    .status.pending { background: #fff8e1; color: #856404; }
    button {
      margin-top: 12px;
      padding: 6px 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f8f8f8;
      cursor: pointer;
    }
    button:hover { background: #e8e8e8; }
  </style>
</head>
<body>
  <h1>Alexandria Options</h1>

  <div class="checkbox-row">
    <input type="checkbox" id="autosave" checked>
    <label for="autosave">Automatically save pages</label>
  </div>

  <label for="blocklist">Blocked domains (one per line)</label>
  <textarea id="blocklist" placeholder="example.com&#10;ads.example.net"></textarea>
  <div class="hint">Pages on these domains will not be auto-saved. Manual save still works.</div>

  <button id="save-btn">Save</button>
  <button id="ping-btn">Test Connection</button>

  <div id="status" class="status pending">Checking connection...</div>

  <script src="options.js"></script>
</body>
</html>
